name: CD Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

env:
  AWS_REGION: us-east-1
  ECR_REPO_PIPELINE: rag-pipeline
  ECR_REPO_IMAGES: rag-images-container

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio
      
      - name: Set environment variables for tests
        run: |
          echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" >> $GITHUB_ENV
          echo "PINECONE_API_KEY=${{ secrets.PINECONE_API_KEY }}" >> $GITHUB_ENV
          echo "PINECONE_HOST=${{ secrets.PINECONE_HOST }}" >> $GITHUB_ENV
      
      - name: Run core function tests
        run: |
          pytest tests/test_chunks.py tests/test_doc_reader.py tests/test_load_model.py tests/test_prompt.py -v --tb=short
        continue-on-error: false
      
      - name: Test imports and basic functionality
        run: |
          python -c "from src.pipelines.pipeline import RAGPipeline; print('✓ Pipeline imports successfully')"
          python -c "from src.scripts.doc_reader import read_doc; print('✓ Doc reader imports successfully')"
          python -c "from src.scripts.chunks import divide_chunks; print('✓ Chunks imports successfully')"
          python -c "from src.scripts.load_model import load_embed_model, load_llm; print('✓ Model loader imports successfully')"

  build-and-push-pipeline:
    name: Build and Push Pipeline Container to ECR
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: Build Pipeline Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -f Dockerfile.pipeline -t $ECR_REGISTRY/$ECR_REPO_PIPELINE:$IMAGE_TAG .
          docker tag $ECR_REGISTRY/$ECR_REPO_PIPELINE:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPO_PIPELINE:latest
      
      - name: Test Pipeline Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          # Test that the image builds correctly and Python runs
          docker run --rm $ECR_REGISTRY/$ECR_REPO_PIPELINE:$IMAGE_TAG python -c "print('✓ Pipeline container works'); import sys; sys.exit(0)" || exit 1
      
      - name: Push Pipeline image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker push $ECR_REGISTRY/$ECR_REPO_PIPELINE:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPO_PIPELINE:latest
      
      - name: Log Pipeline image URI
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          echo "✓ Pipeline Image: $ECR_REGISTRY/$ECR_REPO_PIPELINE:$IMAGE_TAG"
          echo "✓ Pipeline Image (latest): $ECR_REGISTRY/$ECR_REPO_PIPELINE:latest"

  build-and-push-api:
    name: Build and Push FastAPI Container to ECR
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: Build FastAPI Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          echo "Building FastAPI image..."
          docker build -f Dockerfile.api -t $ECR_REGISTRY/$ECR_REPO_IMAGES:api-$IMAGE_TAG .
          docker tag $ECR_REGISTRY/$ECR_REPO_IMAGES:api-$IMAGE_TAG $ECR_REGISTRY/$ECR_REPO_IMAGES:api-latest
      
      - name: Test FastAPI Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          # Test that the API container starts correctly
          docker run --rm $ECR_REGISTRY/$ECR_REPO_IMAGES:api-$IMAGE_TAG python -c "from api import app; print('✓ FastAPI app imports successfully')" || exit 1
      
      - name: Push FastAPI image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          echo "Pushing FastAPI image to ECR..."
          docker push $ECR_REGISTRY/$ECR_REPO_IMAGES:api-$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPO_IMAGES:api-latest
      
      - name: Log FastAPI deployment
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          echo "======================================================================"
          echo "✅ FASTAPI IMAGE DEPLOYED"
          echo "======================================================================"
          echo "Repository: $ECR_REPO_IMAGES"
          echo "Versioned Tag: $ECR_REGISTRY/$ECR_REPO_IMAGES:api-$IMAGE_TAG"
          echo "Latest Tag:    $ECR_REGISTRY/$ECR_REPO_IMAGES:api-latest"
          echo "======================================================================"

  build-and-push-streamlit:
    name: Build and Push Streamlit Container to ECR
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: Build Streamlit Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          echo "Building Streamlit image..."
          docker build -f Dockerfile.streamlit -t $ECR_REGISTRY/$ECR_REPO_IMAGES:streamlit-$IMAGE_TAG .
          docker tag $ECR_REGISTRY/$ECR_REPO_IMAGES:streamlit-$IMAGE_TAG $ECR_REGISTRY/$ECR_REPO_IMAGES:streamlit-latest
      
      - name: Test Streamlit Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          # Test that the Streamlit container has required dependencies
          docker run --rm $ECR_REGISTRY/$ECR_REPO_IMAGES:streamlit-$IMAGE_TAG python -c "import streamlit; import requests; print('✓ Streamlit app dependencies installed')" || exit 1
      
      - name: Push Streamlit image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          echo "Pushing Streamlit image to ECR..."
          docker push $ECR_REGISTRY/$ECR_REPO_IMAGES:streamlit-$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPO_IMAGES:streamlit-latest
      
      - name: Log Streamlit deployment
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          echo "======================================================================"
          echo "✅ STREAMLIT IMAGE DEPLOYED"
          echo "======================================================================"
          echo "Repository: $ECR_REPO_IMAGES"
          echo "Versioned Tag: $ECR_REGISTRY/$ECR_REPO_IMAGES:streamlit-$IMAGE_TAG"
          echo "Latest Tag:    $ECR_REGISTRY/$ECR_REPO_IMAGES:streamlit-latest"
          echo "======================================================================"

  notify:
    name: Notify Deployment Status
    runs-on: ubuntu-latest
    needs: [build-and-push-pipeline, build-and-push-api, build-and-push-streamlit]
    if: always()
    
    steps:
      - name: Check deployment status
        run: |
          if [ "${{ needs.build-and-push-pipeline.result }}" == "success" ] && [ "${{ needs.build-and-push-api.result }}" == "success" ] && [ "${{ needs.build-and-push-streamlit.result }}" == "success" ]; then
            echo "======================================================================"
            echo "✅ ALL CONTAINERS SUCCESSFULLY PUSHED TO ECR"
            echo "======================================================================"
            echo ""
            echo "1. Pipeline Container: rag-pipeline"
            echo "   Status: ✓ Success"
            echo ""
            echo "2. FastAPI Container: rag-images-container:api-latest"
            echo "   Status: ✓ Success"
            echo ""
            echo "3. Streamlit Container: rag-images-container:streamlit-latest"
            echo "   Status: ✓ Success"
            echo ""
            echo "======================================================================"
            echo "NEXT STEPS:"
            echo "1. Update ECS task definitions with the new image URIs"
            echo "2. Deploy/Update ECS services to use the new images"
            echo "======================================================================"
            exit 0
          else
            echo "======================================================================"
            echo "❌ SOME CONTAINER DEPLOYMENTS FAILED"
            echo "======================================================================"
            echo ""
            echo "Pipeline:  ${{ needs.build-and-push-pipeline.result }}"
            echo "FastAPI:   ${{ needs.build-and-push-api.result }}"
            echo "Streamlit: ${{ needs.build-and-push-streamlit.result }}"
            echo ""
            echo "======================================================================"
            exit 1
          fi
