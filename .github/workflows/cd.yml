name: CD Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

env:
  AWS_REGION: us-east-1
  ECR_REPO_API: rag-api
  ECR_REPO_STREAMLIT: rag-streamlit

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio httpx
      
      - name: Set environment variables for tests
        run: |
          echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" >> $GITHUB_ENV
          echo "PINECONE_API_KEY=${{ secrets.PINECONE_API_KEY }}" >> $GITHUB_ENV
          echo "PINECONE_HOST=${{ secrets.PINECONE_HOST }}" >> $GITHUB_ENV
      
      - name: Run unit tests
        run: |
          pytest tests/test_api.py -v --tb=short
      
      - name: Run pipeline tests
        run: |
          pytest tests/test_pipeline.py -v --tb=short
      
      - name: Run integration tests
        run: |
          pytest tests/test_integration.py -v --tb=short
      
      - name: Run all tests with coverage
        run: |
          pytest tests/ --cov=. --cov-report=xml --cov-report=term -v
      
      - name: Upload coverage reports
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
        continue-on-error: true

  build-and-push:
    name: Build and Push to ECR
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1
      
      - name: Get AWS account ID
        id: get-account-id
        run: |
          echo "ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)" >> $GITHUB_OUTPUT
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: Build API Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -f Dockerfile.api -t $ECR_REGISTRY/$ECR_REPO_API:$IMAGE_TAG .
          docker tag $ECR_REGISTRY/$ECR_REPO_API:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPO_API:latest
      
      - name: Build Streamlit Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -f Dockerfile.streamlit -t $ECR_REGISTRY/$ECR_REPO_STREAMLIT:$IMAGE_TAG .
          docker tag $ECR_REGISTRY/$ECR_REPO_STREAMLIT:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPO_STREAMLIT:latest
      
      - name: Run API container test
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker run -d -p 8000:8000 \
            -e OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }} \
            -e PINECONE_API_KEY=${{ secrets.PINECONE_API_KEY }} \
            -e PINECONE_HOST=${{ secrets.PINECONE_HOST }} \
            --name test-api \
            $ECR_REGISTRY/$ECR_REPO_API:$IMAGE_TAG
          
          # Wait for container to start
          sleep 10
          
          # Check if container is running
          docker ps | grep test-api
          
          # Test health endpoint
          curl --retry 5 --retry-delay 3 --retry-connrefused http://localhost:8000/health
          
          # Stop and remove container
          docker stop test-api
          docker rm test-api
      
      - name: Run Streamlit container test
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker run -d -p 8501:8501 \
            -e API_URL=http://localhost:8000 \
            --name test-streamlit \
            $ECR_REGISTRY/$ECR_REPO_STREAMLIT:$IMAGE_TAG
          
          # Wait for container to start
          sleep 10
          
          # Check if container is running
          docker ps | grep test-streamlit
          
          # Stop and remove container
          docker stop test-streamlit
          docker rm test-streamlit
      
      - name: Push API image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker push $ECR_REGISTRY/$ECR_REPO_API:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPO_API:latest
      
      - name: Push Streamlit image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker push $ECR_REGISTRY/$ECR_REPO_STREAMLIT:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPO_STREAMLIT:latest
      
      - name: Log image URIs
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          echo "API Image: $ECR_REGISTRY/$ECR_REPO_API:$IMAGE_TAG"
          echo "Streamlit Image: $ECR_REGISTRY/$ECR_REPO_STREAMLIT:$IMAGE_TAG"
          echo "API Image (latest): $ECR_REGISTRY/$ECR_REPO_API:latest"
          echo "Streamlit Image (latest): $ECR_REGISTRY/$ECR_REPO_STREAMLIT:latest"

  notify:
    name: Notify Deployment Status
    runs-on: ubuntu-latest
    needs: build-and-push
    if: always()
    
    steps:
      - name: Check deployment status
        run: |
          if [ "${{ needs.build-and-push.result }}" == "success" ]; then
            echo "✅ Deployment successful - Images pushed to ECR"
            exit 0
          else
            echo "❌ Deployment failed"
            exit 1
          fi
